<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} · AIUB World Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><span class="dot"></span> AIUB World Cup <b>2026</b></a>
    <nav class="nav">
      {% for label, href in nav %}
        <a href="{{ href }}" class="nav-link{{ ' active' if request.path == href or (href != '/' and request.path.startswith(href)) }}">{{ label|capitalize }}</a>
      {% endfor %}
    </nav>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
    <button id="refresh-btn" class="btn" type="button" aria-live="polite">Refresh data</button>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    Data scraped from <a href="https://ofsportsaiub.org">ofsportsaiub.org</a>
    {% if manifest.scraped_at %} · last updated {{ manifest.scraped_at }}{% endif %}
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/sim.js') }}" defer></script>
</body>
</html>
